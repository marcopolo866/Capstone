plugins {
    id "com.android.application"
}

android {
    namespace "edu.uidaho.capstone.androidrunner"
    compileSdk 36

    defaultConfig {
        applicationId "edu.uidaho.capstone.androidrunner"
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "0.1.0"

        ndkVersion "28.2.13676358"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++20 -O3 -Wall -Wextra"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging true
        }
    }
}
