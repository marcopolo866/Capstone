name: Native Sanitizers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/native-sanitizers.yml'
      - 'scripts/build-local*.py'
      - 'scripts/build-local*.sh'
      - 'scripts/build-local*.ps1'
      - 'src/**'
      - 'baselines/**'
      - 'tests/**'
      - 'CMakeLists.txt'

jobs:
  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_os: windows-2022
            os_tag: windows
            sanitizer: address
          - runner_os: windows-2022
            os_tag: windows
            sanitizer: undefined
          - runner_os: ubuntu-24.04
            os_tag: linux
            sanitizer: address
          - runner_os: ubuntu-24.04
            os_tag: linux
            sanitizer: undefined
          - runner_os: macos-14
            os_tag: macos
            sanitizer: address
          - runner_os: macos-14
            os_tag: macos
            sanitizer: undefined
    runs-on: ${{ matrix.runner_os }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 toolchain (Windows)
        if: matrix.os_tag == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-python

      - name: Add MinGW to PATH (Windows)
        if: matrix.os_tag == 'windows'
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Install system build dependencies (Linux)
        if: matrix.os_tag == 'linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential make cmake libgmp-dev python3-tk

      - name: Install system build dependencies (macOS)
        if: matrix.os_tag == 'macos'
        run: |
          set -euo pipefail
          brew install gmp cmake ccache || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop_runner/requirements.txt

      - name: Run full validation with sanitizer (Windows)
        if: matrix.os_tag == 'windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          export BUILD_LOCAL_SKIP_SUBMODULE_UPDATE=1
          python scripts/build-local.py --backend sh --validation full --sanitizer "${{ matrix.sanitizer }}" 2>&1 | tee "sanitizer-${{ matrix.os_tag }}-${{ matrix.sanitizer }}.log"

      - name: Run full validation with sanitizer (Linux/macOS)
        if: matrix.os_tag != 'windows'
        run: |
          set -euo pipefail
          export BUILD_LOCAL_SKIP_SUBMODULE_UPDATE=1
          python scripts/build-local.py --backend sh --validation full --sanitizer "${{ matrix.sanitizer }}" 2>&1 | tee "sanitizer-${{ matrix.os_tag }}-${{ matrix.sanitizer }}.log"

      - name: Upload sanitizer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-logs-${{ matrix.os_tag }}-${{ matrix.sanitizer }}
          path: sanitizer-${{ matrix.os_tag }}-${{ matrix.sanitizer }}.log
          if-no-files-found: warn
          retention-days: 30
