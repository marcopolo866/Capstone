name: Build Binaries

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build binaries
        run: |
          set -euo pipefail
          bash scripts/build-local.sh

      - name: Run automated regression tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tests -p "test_*.py" -v

      - name: Write binary manifest
        run: |
          set -euo pipefail
          mkdir -p outputs
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          import scripts.solver_discovery as solver_discovery

          def sha256(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as fh:
                  while True:
                      block = fh.read(65536)
                      if not block:
                          break
                      h.update(block)
              return h.hexdigest()

          repo_root = Path(".").resolve()
          catalog = solver_discovery.build_catalog(repo_root)
          source_paths = [str(row["source_path"]) for row in catalog.get("variants", [])]
          binary_paths = list(solver_discovery.iter_binary_paths(catalog, include_baselines=True))
          variant_by_binary = {
              str(row.get("binary_path") or "").strip(): row
              for row in catalog.get("variants", [])
              if str(row.get("binary_path") or "").strip()
          }

          manifest = {
              "commit_sha": os.environ.get("GITHUB_SHA", ""),
              "sources": {},
              "binaries": {},
              "skipped_variants": [],
              "solver_catalog_schema_version": catalog.get("schema_version", 1),
              "solver_variants": catalog.get("solvers", []),
          }
          for rel in source_paths:
              path = Path(rel)
              if not path.is_file():
                  raise SystemExit(f"Missing source for manifest: {rel}")
              manifest["sources"][rel] = sha256(path)
          missing_required_binaries: list[str] = []
          for rel in binary_paths:
              path = Path(rel)
              if not path.is_file():
                  variant = variant_by_binary.get(rel)
                  if variant is None:
                      missing_required_binaries.append(rel)
                      continue
                  manifest["skipped_variants"].append(
                      {
                          "variant_id": str(variant.get("variant_id") or "").strip(),
                          "label": str(variant.get("label") or variant.get("variant_id") or "variant"),
                          "source_path": str(variant.get("source_path") or "").strip(),
                          "binary_path": rel,
                          "reason": "missing binary after build (compile failure or incompatible toolchain)",
                      }
                  )
                  continue
              manifest["binaries"][rel] = sha256(path)
          if missing_required_binaries:
              raise SystemExit(
                  "Missing required binaries for manifest: " + ", ".join(sorted(missing_required_binaries))
              )
          if manifest["skipped_variants"]:
              print("Skipped discovered variants:")
              for item in manifest["skipped_variants"]:
                  print(f"  - {item['label']} ({item['source_path']}): {item['reason']}")

          out = Path("outputs/binaries_manifest.json")
          out.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(f"Wrote {out}")
          Path("outputs/solver_variants.json").write_text(
              json.dumps(
                  {
                      "schema_version": catalog.get("schema_version", 1),
                      "solvers": catalog.get("solvers", []),
                  },
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: algorithm-binaries-linux
          path: |
            baselines/dijkstra
            baselines/dial
            baselines/via_dijkstra
            baselines/via_dial
            src/dijkstra_*
            src/sp_via_*
            src/vf3_*
            src/glasgow_*
            baselines/vf3lib/bin/vf3
            baselines/glasgow-subgraph-solver/build/glasgow_subgraph_solver
            outputs/binaries_manifest.json
            outputs/solver_variants.json
          if-no-files-found: error
          retention-days: 90
