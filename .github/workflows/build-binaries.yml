name: Build Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'baselines/dijkstra_main.cpp'
      - 'baselines/nyaan-library/**'
      - 'baselines/vf3lib/**'
      - 'baselines/glasgow-subgraph-solver/**'
      - 'src/**'
      - 'scripts/check-glasgow-parity.py'
      - '.github/workflows/build-binaries.yml'
      - '.gitmodules'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build binaries
        run: |
          set -euo pipefail

          echo "Building baseline Dijkstra..."
          g++ -std=c++17 -O3 \
            -I "baselines/nyaan-library" \
            "baselines/dijkstra_main.cpp" \
            -o "baselines/dijkstra"

          echo "Building Dijkstra ChatGPT..."
          g++ -std=c++17 -O3 \
            "src/[CHATGPT] Shortest Path.cpp" \
            -o "src/dijkstra_llm"

          echo "Building Dijkstra Gemini..."
          g++ -std=c++17 -O3 \
            "src/[GEMINI] Shortest Path.cpp" \
            -o "src/dijkstra_gemini"

          echo "Building VF3 baseline..."
          VF3_CFLAGS="-std=c++11 -O3 -DNDEBUG -flto -fomit-frame-pointer -pipe -mtune=generic -Wno-deprecated"
          make -C baselines/vf3lib vf3 CFLAGS="$VF3_CFLAGS"

          echo "Building VF3 Gemini (src)..."
          g++ -std=c++17 -O3 "src/[GEMINI] Subgraph Isomorphism.cpp" -o "src/vf3"

          echo "Building VF3 ChatGPT (src)..."
          g++ -std=c++17 -O3 "src/[CHATGPT] Subgraph Isomorphism.cpp" -o "src/chatvf3"

          echo "Building Glasgow ChatGPT (src)..."
          g++ -std=c++17 -O3 "src/[CHATGPT] Glasgow.cpp" -o "src/glasgow_chatgpt"

          echo "Building Glasgow Gemini (src)..."
          g++ -std=c++17 -O3 "src/[GEMINI] Glasgow.cpp" -o "src/glasgow_gemini"

          echo "Building Glasgow..."
          cd baselines/glasgow-subgraph-solver
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-O3"
          make -j$(nproc)
          cd ../../..

          chmod +x \
            baselines/dijkstra \
            src/dijkstra_llm \
            src/dijkstra_gemini \
            src/vf3 \
            src/chatvf3 \
            src/glasgow_chatgpt \
            src/glasgow_gemini \
            baselines/vf3lib/bin/vf3 \
            baselines/glasgow-subgraph-solver/build/glasgow_subgraph_solver

      - name: Check Glasgow parity
        run: |
          set -euo pipefail
          python3 scripts/check-glasgow-parity.py

      - name: Write binary manifest
        run: |
          set -euo pipefail
          mkdir -p outputs
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          def sha256(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as fh:
                  while True:
                      block = fh.read(65536)
                      if not block:
                          break
                      h.update(block)
              return h.hexdigest()

          source_paths = [
              "src/[CHATGPT] Glasgow.cpp",
              "src/[GEMINI] Glasgow.cpp",
          ]
          binary_paths = [
              "src/glasgow_chatgpt",
              "src/glasgow_gemini",
              "baselines/vf3lib/bin/vf3",
              "baselines/glasgow-subgraph-solver/build/glasgow_subgraph_solver",
              "src/chatvf3",
              "src/vf3",
          ]

          manifest = {
              "commit_sha": os.environ.get("GITHUB_SHA", ""),
              "sources": {},
              "binaries": {},
          }
          for rel in source_paths:
              path = Path(rel)
              if not path.is_file():
                  raise SystemExit(f"Missing source for manifest: {rel}")
              manifest["sources"][rel] = sha256(path)
          for rel in binary_paths:
              path = Path(rel)
              if not path.is_file():
                  raise SystemExit(f"Missing binary for manifest: {rel}")
              manifest["binaries"][rel] = sha256(path)

          out = Path("outputs/binaries_manifest.json")
          out.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(f"Wrote {out}")
          PY

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: algorithm-binaries-linux
          path: |
            baselines/dijkstra
            src/dijkstra_llm
            src/dijkstra_gemini
            src/vf3
            src/chatvf3
            src/glasgow_chatgpt
            src/glasgow_gemini
            baselines/vf3lib/bin/vf3
            baselines/glasgow-subgraph-solver/build/glasgow_subgraph_solver
            outputs/binaries_manifest.json
          if-no-files-found: error
          retention-days: 90
