name: Build Benchmark Runner (Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-benchmark-runner-windows.yml'
      - 'desktop_runner/**'
      - 'scripts/build-local.ps1'
      - 'src/**'
      - 'baselines/**'
      - 'utilities/generate_graphs.py'

jobs:
  build-windows-runner:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-python

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop_runner/requirements.txt

      - name: Build native benchmark binaries
        shell: pwsh
        run: |
          ./scripts/build-local.ps1 -CMakeGenerator "MinGW Makefiles"

      - name: Package one-file desktop benchmark runner
        shell: pwsh
        env:
          MINGW_ROOT: C:\msys64\mingw64
        run: |
          ./desktop_runner/build_windows_exe.ps1

      - name: Upload runner artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner-windows-exe
          path: dist/capstone-benchmark-runner.exe
          if-no-files-found: error
          retention-days: 30
