name: Build Benchmark Runner (Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-benchmark-runner-windows.yml'
      - 'desktop_runner/**'
      - 'scripts/build-local.ps1'
      - 'scripts/build-local.sh'
      - 'src/**'
      - 'baselines/**'
      - 'utilities/generate_graphs.py'

jobs:
  build-windows-runner:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-python

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop_runner/requirements.txt

      - name: Prepare diagnostics directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null

      - name: Build native benchmark binaries (MSYS2)
        shell: msys2 {0}
        run: |
          set -o pipefail
          export CMAKE_GENERATOR="MinGW Makefiles"
          bash scripts/build-local.sh 2>&1 | tee logs/build-local-msys2.log

      - name: Package one-file desktop benchmark runner
        shell: pwsh
        env:
          MINGW_ROOT: C:\msys64\mingw64
        run: |
          ./desktop_runner/build_windows_exe.ps1 *>&1 | Tee-Object -FilePath logs/build-runner-packaging.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload runner artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner-windows-exe
          path: dist/capstone-benchmark-runner.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner-build-logs
          path: |
            logs/**
            baselines/glasgow-subgraph-solver/build/CMakeFiles/CMakeOutput.log
            baselines/glasgow-subgraph-solver/build/CMakeFiles/CMakeError.log
          if-no-files-found: warn
          retention-days: 30
