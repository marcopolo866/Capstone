name: Build Benchmark Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-benchmark-runner.yml'
      - '.github/ci_data_collection/**'
      - 'desktop_runner/**'
      - 'scripts/build-local.ps1'
      - 'scripts/build-local.sh'
      - 'scripts/build-local.py'
      - 'scripts/build-local-core.py'
      - 'scripts/solver_discovery.py'
      - 'scripts/check-*.py'
      - 'scripts/clean-local-build.py'
      - 'Makefile'
      - 'src/**'
      - 'baselines/**'
      - 'utilities/**'
      - 'data_collection/**'
      - 'tests/**'
  pull_request:
    paths:
      - '.github/workflows/build-benchmark-runner.yml'
      - '.github/ci_data_collection/**'
      - 'desktop_runner/**'
      - 'scripts/build-local.ps1'
      - 'scripts/build-local.sh'
      - 'scripts/build-local.py'
      - 'scripts/build-local-core.py'
      - 'scripts/solver_discovery.py'
      - 'scripts/check-*.py'
      - 'scripts/clean-local-build.py'
      - 'Makefile'
      - 'src/**'
      - 'baselines/**'
      - 'utilities/**'
      - 'data_collection/**'
      - 'tests/**'

jobs:
  build-runner:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_os: windows-2022
            os_tag: windows
          - runner_os: ubuntu-24.04
            os_tag: linux
          - runner_os: macos-14
            os_tag: macos
    runs-on: ${{ matrix.runner_os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 toolchain (Windows)
        if: matrix.os_tag == 'windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-python

      - name: Add MinGW to PATH (Windows)
        if: matrix.os_tag == 'windows'
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          if (-not $env:MSYS2_LOCATION) {
            throw "Missing MSYS2_LOCATION from setup-msys2 output"
          }
          $mingwRoot = Join-Path $env:MSYS2_LOCATION "mingw64"
          $mingwBin = Join-Path $env:MSYS2_LOCATION "mingw64\bin"
          $usrBin = Join-Path $env:MSYS2_LOCATION "usr\bin"
          "MSYS2_LOCATION=$env:MSYS2_LOCATION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MINGW_ROOT=$mingwRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $usrBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Install system build dependencies (Linux)
        if: matrix.os_tag == 'linux'
        run: |
          set -euo pipefail
          missing=()
          for pkg in build-essential make cmake libgmp-dev python3-tk; do
            if ! dpkg -s "$pkg" >/dev/null 2>&1; then
              missing+=("$pkg")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          else
            echo "All Linux system dependencies already installed"
          fi

      - name: Install system build dependencies (macOS)
        if: matrix.os_tag == 'macos'
        run: |
          set -euo pipefail
          missing=()
          if ! brew list --versions gmp >/dev/null 2>&1; then
            missing+=("gmp")
          fi
          if ! command -v cmake >/dev/null 2>&1; then
            missing+=("cmake")
          fi
          if ! command -v ccache >/dev/null 2>&1; then
            missing+=("ccache")
          fi
          if (( ${#missing[@]} > 0 )); then
            brew install "${missing[@]}"
          else
            echo "All macOS system dependencies already installed"
          fi

      - name: Restore compiler cache (macOS)
        if: matrix.os_tag == 'macos'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-macos-${{ hashFiles('src/**/*.cpp', 'baselines/**/*.cpp', 'scripts/build-local-core.py', 'scripts/solver_discovery.py') }}
          restore-keys: |
            ccache-macos-

      - name: Configure ccache (macOS)
        if: matrix.os_tag == 'macos'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ccache"
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=1024M" >> "$GITHUB_ENV"
          ccache_libexec="$(brew --prefix)/opt/ccache/libexec"
          if [ -d "$ccache_libexec" ]; then
            echo "$ccache_libexec" >> "$GITHUB_PATH"
          fi
          ccache -z || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop_runner/requirements.txt

      - name: Prepare diagnostics directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null

      - name: Build and verify make data-collection smoke pipeline (Windows)
        if: matrix.os_tag == 'windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          export BUILD_LOCAL_SKIP_SUBMODULE_UPDATE=1
          python_win="${pythonLocation}\\python.exe"
          python_unix="$(cygpath -u "$python_win")"
          make data-collection BACKEND=ps1 PYTHON="$python_unix" MANIFEST_DIR=.github/ci_data_collection 2>&1 | tee logs/data-collection-smoke.log

      - name: Build and verify make data-collection smoke pipeline (Linux/macOS)
        if: matrix.os_tag != 'windows'
        run: |
          set -euo pipefail
          export BUILD_LOCAL_SKIP_SUBMODULE_UPDATE=1
          make data-collection BACKEND=sh MANIFEST_DIR=.github/ci_data_collection 2>&1 | tee "logs/data-collection-smoke-${{ matrix.os_tag }}.log"

      - name: Show compiler cache stats (macOS)
        if: always() && matrix.os_tag == 'macos'
        run: |
          ccache -s || true

      - name: Package desktop benchmark runner (Windows)
        if: matrix.os_tag == 'windows'
        shell: pwsh
        run: |
          python desktop_runner/build_runner.py *>&1 | Tee-Object -FilePath logs/build-runner-packaging.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package desktop benchmark runner (Linux/macOS)
        if: matrix.os_tag != 'windows'
        run: |
          set -euo pipefail
          python desktop_runner/build_runner.py 2>&1 | tee "logs/build-runner-packaging-${{ matrix.os_tag }}.log"

      - name: Upload runner artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner-${{ matrix.os_tag }}
          path: |
            dist/capstone-benchmark-runner.exe
            dist/capstone-benchmark-runner
            dist/capstone-benchmark-runner.app/**
          if-no-files-found: error
          retention-days: 30

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner-build-logs-${{ matrix.os_tag }}
          path: |
            logs/**
            .github/ci_data_collection/runs/**
            desktop_runner/.staging/**
            baselines/glasgow-subgraph-solver/build/CMakeFiles/CMakeOutput.log
            baselines/glasgow-subgraph-solver/build/CMakeFiles/CMakeError.log
          if-no-files-found: warn
          retention-days: 30

      - name: Clean workspace artifacts (Windows)
        if: always() && matrix.os_tag == 'windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          python_win="${pythonLocation}\\python.exe"
          python_unix="$(cygpath -u "$python_win")"
          make clean PYTHON="$python_unix"

      - name: Clean workspace artifacts (Linux/macOS)
        if: always() && matrix.os_tag != 'windows'
        run: |
          set -euo pipefail
          make clean

  publish-public-release:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build-runner
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download packaged runner artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_inputs
          pattern: benchmark-runner-*

      - name: Build public release archives
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          root = Path("release_inputs")
          out = Path("release_assets")
          out.mkdir(parents=True, exist_ok=True)

          targets = {
              "windows": ("benchmark-runner-windows", "capstone-benchmark-runner.exe"),
              "linux": ("benchmark-runner-linux", "capstone-benchmark-runner"),
              "macos": ("benchmark-runner-macos", "capstone-benchmark-runner.app"),
          }

          for os_tag, (artifact_dir_name, payload_name) in targets.items():
              artifact_dir = root / artifact_dir_name
              payload = artifact_dir / payload_name
              if not payload.exists():
                  raise SystemExit(f"Missing expected packaged runner payload: {payload}")
              archive_base = out / f"benchmark-runner-{os_tag}"
              archive_path = shutil.make_archive(
                  str(archive_base),
                  "zip",
                  root_dir=str(payload.parent),
                  base_dir=payload.name,
              )
              print(f"Created {archive_path}")
          PY

      - name: Publish public benchmark runner release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > release_notes.md <<EOF
          Public benchmark runner build for commit \`${GITHUB_SHA}\`.

          Source workflow: \`.github/workflows/build-benchmark-runner.yml\`
          Updated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          if gh release view benchmark-runner-latest >/dev/null 2>&1; then
            gh release edit benchmark-runner-latest \
              --title "Benchmark Runner Latest" \
              --notes-file release_notes.md
          else
            gh release create benchmark-runner-latest \
              --title "Benchmark Runner Latest" \
              --notes-file release_notes.md
          fi

          gh release upload benchmark-runner-latest release_assets/*.zip --clobber
