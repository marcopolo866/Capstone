name: Build Benchmark Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-benchmark-runner.yml'
      - 'desktop_runner/**'
      - 'desktop_runner/build_runner.py'
      - 'scripts/build-local.ps1'
      - 'scripts/build-local.sh'
      - 'scripts/build-local.py'
      - 'Makefile'
      - 'src/**'
      - 'baselines/**'
      - 'utilities/generate_graphs.py'

jobs:
  build-runner:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_os: windows-latest
            os_tag: windows
          - runner_os: ubuntu-latest
            os_tag: linux
          - runner_os: macos-latest
            os_tag: macos
    runs-on: ${{ matrix.runner_os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 toolchain (Windows)
        if: matrix.os_tag == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-python

      - name: Add MinGW to PATH (Windows)
        if: matrix.os_tag == 'windows'
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system build dependencies (Linux)
        if: matrix.os_tag == 'linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential make cmake libgmp-dev

      - name: Install system build dependencies (macOS)
        if: matrix.os_tag == 'macos'
        run: |
          set -euo pipefail
          brew update
          brew install gmp cmake

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop_runner/requirements.txt

      - name: Prepare diagnostics directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null

      - name: Build native benchmark binaries (Windows/MSYS2)
        if: matrix.os_tag == 'windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          mingw_root_win="$(cygpath -w "$(dirname "$(dirname "$(which g++)")")")"
          echo "Resolved MinGW root: ${mingw_root_win}"
          echo "MINGW_ROOT=${mingw_root_win}" >> "$GITHUB_ENV"
          python scripts/build-local.py --backend sh --cmake-generator "MinGW Makefiles" 2>&1 | tee logs/build-local-msys2.log

      - name: Build native benchmark binaries (Linux/macOS)
        if: matrix.os_tag != 'windows'
        run: |
          set -euo pipefail
          python scripts/build-local.py --backend sh 2>&1 | tee "logs/build-local-${{ matrix.os_tag }}.log"

      - name: Package desktop benchmark runner (Windows)
        if: matrix.os_tag == 'windows'
        shell: pwsh
        run: |
          python desktop_runner/build_runner.py *>&1 | Tee-Object -FilePath logs/build-runner-packaging.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package desktop benchmark runner (Linux/macOS)
        if: matrix.os_tag != 'windows'
        run: |
          set -euo pipefail
          python desktop_runner/build_runner.py 2>&1 | tee "logs/build-runner-packaging-${{ matrix.os_tag }}.log"

      - name: Upload runner artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner-${{ matrix.os_tag }}
          path: |
            dist/capstone-benchmark-runner.exe
            dist/capstone-benchmark-runner
            dist/capstone-benchmark-runner.app/**
          if-no-files-found: error
          retention-days: 30

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner-build-logs-${{ matrix.os_tag }}
          path: |
            logs/**
            baselines/glasgow-subgraph-solver/build/CMakeFiles/CMakeOutput.log
            baselines/glasgow-subgraph-solver/build/CMakeFiles/CMakeError.log
          if-no-files-found: warn
          retention-days: 30
